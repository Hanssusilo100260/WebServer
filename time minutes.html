<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Countdown Timer</title>

</head>

<body>


<h2>Set Countdown Time</h2>

<label for="hours">Hours:</label>

<input type="number" id="hours" min="0" value="0">

<label for="minutes">Minutes:</label>

<input type="number" id="minutes" min="0" max="59" value="0">

<label for="seconds">Seconds:</label>

<input type="number" id="seconds" min="0" max="59" value="60">

<button onclick="startTimer()">Start Countdown</button>


<div id="timer">00:00:00</div>


<script>

    var countdownSeconds = 0;
    var timer;

    function startTimer() {
        var hoursInput = parseInt(document.getElementById("hours").value);
        var minutesInput = parseInt(document.getElementById("minutes").value);
        var secondsInput = parseInt(document.getElementById("seconds").value);

        countdownSeconds = (hoursInput * 3600) + (minutesInput * 60) + secondsInput;

        clearInterval(timer);
        timer = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
        countdownSeconds--;
        if (countdownSeconds < 0) {
            clearInterval(timer);
            document.getElementById("timer").innerText = "Time's up!";
        } else {
            var hours = Math.floor(countdownSeconds / 3600);
            var minutes = Math.floor((countdownSeconds % 3600) / 60);
            var seconds = countdownSeconds % 60;
            document.getElementById("timer").innerText = pad(hours) + ":" + pad(minutes) + ":" + pad(seconds);
        }
    }

    function pad(value) {
        return value < 10 ? "0" + value : value;
    }

</script>


</body>

</html>
